<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄时钟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
      width: 350px;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }

    .status {
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
      padding: 8px 16px;
      background: #f5f5f5;
      border-radius: 20px;
      display: inline-block;
    }

    .status.work { background: #ffe5e5; color: #d63031; }
    .status.short-break { background: #e5f9ed; color: #00b894; }
    .status.long-break { background: #e5f0ff; color: #0984e3; }

    .timer {
      font-size: 72px;
      font-weight: 700;
      color: #333;
      margin-bottom: 30px;
      font-variant-numeric: tabular-nums;
    }

    .tomato-count {
      font-size: 18px;
      color: #888;
      margin-bottom: 30px;
    }

    .tomato-count span {
      color: #ff6b6b;
      font-weight: 600;
    }

    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .btn {
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: #ff6b6b;
      color: white;
    }

    .btn-primary:hover {
      background: #ee5a5a;
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #666;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 经典番茄时钟配置
    const CONFIG = {
      workDuration: 25 * 60,      // 25分钟
      shortBreakDuration: 5 * 60, // 5分钟
      longBreakDuration: 15 * 60, // 15分钟
      pomodorosUntilLongBreak: 4
    };

    function App() {
      const [status, setStatus] = useState('work'); // work, short-break, long-break
      const [timeLeft, setTimeLeft] = useState(CONFIG.workDuration);
      const [isRunning, setIsRunning] = useState(false);
      const [pomodoroCount, setPomodoroCount] = useState(0);
      const intervalRef = useRef(null);
      const audioRef = useRef(null);

      // 播放提示音
      const playSound = () => {
        if (audioRef.current) {
          audioRef.current.play().catch(() => {});
        }
      };

      // 切换到下一个状态
      const goToNextState = () => {
        playSound();
        if (status === 'work') {
          const newCount = pomodoroCount + 1;
          setPomodoroCount(newCount);
          if (newCount % CONFIG.pomodorosUntilLongBreak === 0) {
            setStatus('long-break');
            setTimeLeft(CONFIG.longBreakDuration);
          } else {
            setStatus('short-break');
            setTimeLeft(CONFIG.shortBreakDuration);
          }
        } else {
          setStatus('work');
          setTimeLeft(CONFIG.workDuration);
        }
      };

      // 计时器倒计时
      useEffect(() => {
        if (isRunning && timeLeft > 0) {
          intervalRef.current = setInterval(() => {
            setTimeLeft(prev => prev - 1);
          }, 1000);
        } else if (timeLeft === 0) {
          setIsRunning(false);
          goToNextState();
        }

        return () => {
          if (intervalRef.current) {
            clearInterval(intervalRef.current);
          }
        };
      }, [isRunning, timeLeft]);

      const toggleTimer = () => {
        setIsRunning(!isRunning);
      };

      const resetTimer = () => {
        setIsRunning(false);
        setTimeLeft(
          status === 'work' ? CONFIG.workDuration :
          status === 'short-break' ? CONFIG.shortBreakDuration :
          CONFIG.longBreakDuration
        );
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };

      const getStatusText = () => {
        switch (status) {
          case 'work': return '专注工作';
          case 'short-break': return '短休息';
          case 'long-break': return '长休息';
          default: return '';
        }
      };

      return (
        <div className="container">
          <audio ref={audioRef} src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdH2JkI2Ff3Z4gIaKjYuGgXx6fYKHi42LiIR/fH2AhoqNjYuHgn98fYCGi42LiIOAfX2AhouNjIuHhIB+foGDh4yMi4iEgH5+gYSHjIyLiISAf36BhIeMjIuIhIB/foGEh4yMi4iEgH9+gYSHjIyLiISAf36BhIeMjIuIhIB/foGEh4yMi4iEgH9+gYSHjIyLiISAf36BhIeMjIuIhIB/foGEh4yMi4iEgH9+gYSHjIyLiISAf36BhIeMjIuIhICAf4CBg4aIiIeEgH+BgYOGiIiHhIB/gIGDhoiIh4SAf4CBg4aIiIeEgH+BgYOGiIiHhIB/gIGDhoiIh4SAf4CBg4aIiIeEgH+BgYOGiIiHhIB/gIGDhoiIh4SAf4CBg4aIiIeE"></audio>

          <h1 className="title">🍅 番茄时钟</h1>

          <div className={`status ${status}`}>
            {getStatusText()}
          </div>

          <div className="timer">
            {formatTime(timeLeft)}
          </div>

          <div className="tomato-count">
            已完成 <span>{pomodoroCount}</span> 个番茄
          </div>

          <div className="controls">
            <button className="btn btn-primary" onClick={toggleTimer}>
              {isRunning ? '暂停' : '开始'}
            </button>
            <button className="btn btn-secondary" onClick={resetTimer}>
              重置
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
